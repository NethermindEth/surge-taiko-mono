# docker compose automatically loads .env from this directory.
# Copy .env.example to .env, fill in your values, then:
#
#   Dev (Vite HMR):   docker compose up dex-ui-dev
#   Production:       docker compose up dex-ui
services:
  dex-ui-dev:
    build:
      context: .
      target: dev
    env_file: .env # VITE_ vars injected at runtime — no build args needed
    ports:
      - "5173:5173"
    volumes:
      - .:/app # mount source for hot-module reload
      - /app/node_modules # keep the container's node_modules
    restart: unless-stopped

  dex-ui:
    build:
      context: .
      args:
        VITE_L1_RPC_URL: ${VITE_L1_RPC_URL}
        VITE_L2_RPC_URL: ${VITE_L2_RPC_URL}
        VITE_BUILDER_RPC_URL: ${VITE_BUILDER_RPC_URL:-http://localhost:4545}
        VITE_BUILDER_API_URL: ${VITE_BUILDER_API_URL:-http://localhost:4545}
        VITE_CHAIN_ID: ${VITE_CHAIN_ID:-11155111}
        VITE_L1_CHAIN_NAME: ${VITE_L1_CHAIN_NAME:-}
        VITE_L1_NATIVE_SYMBOL: ${VITE_L1_NATIVE_SYMBOL:-}
        VITE_L1_NATIVE_NAME: ${VITE_L1_NATIVE_NAME:-}
        VITE_L1_NATIVE_LOGO: ${VITE_L1_NATIVE_LOGO:-}
        VITE_SAFE_PROXY_FACTORY: ${VITE_SAFE_PROXY_FACTORY:-0x4e1DCf7AD4e460CfD30791CCC4F9c8a4f820ec67}
        VITE_SAFE_SINGLETON: ${VITE_SAFE_SINGLETON:-0x29fcB43b46531BcA003ddC8FCB67FFE91900C762}
        VITE_SAFE_MULTISEND: ${VITE_SAFE_MULTISEND:-0x38869bf66a61cF6bDB996A6aE40D5853Fd43B526}
        VITE_SAFE_FALLBACK_HANDLER: ${VITE_SAFE_FALLBACK_HANDLER:-0xfd0732Dc9E303f09fCEf3a7388Ad10A83459Ec99}
        VITE_USER_OPS_FACTORY: ${VITE_USER_OPS_FACTORY:-0x0000000000000000000000000000000000000000}
        VITE_L1_VAULT: ${VITE_L1_VAULT:-0x0000000000000000000000000000000000000000}
        VITE_USDC_TOKEN: ${VITE_USDC_TOKEN:-0x0000000000000000000000000000000000000000}
        VITE_USDC_DECIMALS: ${VITE_USDC_DECIMALS:-18}
        VITE_SIMPLE_DEX: ${VITE_SIMPLE_DEX:-0x0000000000000000000000000000000000000000}
        VITE_L1_BRIDGE: ${VITE_L1_BRIDGE:-0x0000000000000000000000000000000000000000}
        VITE_L2_CHAIN_ID: ${VITE_L2_CHAIN_ID:-}
        VITE_L2_RELAY: ${VITE_L2_RELAY:-0x0000000000000000000000000000000000000000}
        VITE_WALLETCONNECT_PROJECT_ID: ${VITE_WALLETCONNECT_PROJECT_ID}
    environment:
      BUILDER_URL: ${BUILDER_URL:-http://localhost:4545}
    ports:
      - "8080:80"
    restart: unless-stopped
